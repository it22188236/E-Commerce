events {
  worker_connections 1024;
}

http {
  limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

  upstream auth-service {
    server auth-service:5001;       # ← 5001 matches docker-compose
  }
  upstream product-service {
    server product-service:5002;    # ← 5002
  }
  upstream order-service {
    server order-service:5003;      # ← 5003
  }
  upstream payment-service {
    server payment-service:5004;    # ← 5004
  }

  server {
    listen 80;

    location /health {
      return 200 '{"status":"gateway ok"}';
      add_header Content-Type application/json;
    }

    location = /auth/health {
      proxy_pass http://auth-service/health;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    location = /products/health {
      proxy_pass http://product-service/health;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    location = /orders/health {
      proxy_pass http://order-service/health;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    location = /payments/health {
      proxy_pass http://payment-service/health;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    location /auth/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://auth-service/api/auth/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    location = /auth {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://auth-service/api/auth;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    location /products/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://product-service/api/products/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    location = /products {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://product-service/api/products;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    location /orders/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://order-service/api/orders/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    location = /orders {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://order-service/api/orders;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    location /payments/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://payment-service/api/payments/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    location = /payments/notify {
      proxy_pass http://payment-service/api/payments/notify;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    location = /payments {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://payment-service/api/payments;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    location /notifications/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://payment-service/api/notifications/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    location = /notifications {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://payment-service/api/notifications;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    location /api/auth/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://auth-service/api/auth/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    location = /api/auth {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://auth-service/api/auth;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    location /api/products/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://product-service/api/products/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    location = /api/products {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://product-service/api/products;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    location /api/orders/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://order-service/api/orders/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    location = /api/orders {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://order-service/api/orders;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    location /api/payments/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://payment-service/api/payments/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    location = /api/payments/notify {
      proxy_pass http://payment-service/api/payments/notify;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    location = /api/payments {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://payment-service/api/payments;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    location /api/notifications/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://payment-service/api/notifications/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    location = /api/notifications {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://payment-service/api/notifications;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    location / {
      return 404 '{"error":"route not found"}';
      add_header Content-Type application/json;
    }
  }
}